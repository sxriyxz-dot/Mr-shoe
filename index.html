<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stunning Online Shop</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();
</script>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#1a1a1a,#000);
color:white;
}

header{
text-align:center;
padding:30px;
font-size:32px;
font-weight:bold;
letter-spacing:2px;
background:black;
}

.search{
text-align:center;
margin:20px;
}

.search input{
padding:12px;
width:260px;
border-radius:25px;
border:none;
outline:none;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.product{
background:#111;
border-radius:15px;
width:230px;
padding:15px;
text-align:center;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.product:hover{
transform:translateY(-10px) scale(1.03);
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:#ff3c3c;
border:none;
padding:10px 18px;
border-radius:20px;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff0000;
}

.quantity{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.quantity button{
padding:6px 12px;
}

#cart{
background:#111;
margin:30px;
padding:25px;
border-radius:15px;
}

#cartItems li{
margin:5px 0;
}

form{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

form input,form textarea{
padding:10px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<header>
STUNNING ONLINE SHOP
</header>

<div class="search">
<input type="text" id="searchBox" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div class="products" id="productList">

<div class="product" data-name="Headphones">
<img src="https://images.unsplash.com/photo-1518441902110-0aa61b21f4b2">
<h3>Headphones</h3>
<p>$40</p>

<div class="quantity">
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<button onclick="addToCart('Headphones',40,this)">Add To Cart</button>
</div>

<div class="product" data-name="Smart Watch">
<img src="https://images.unsplash.com/photo-1517430816045-df4b7de11d1d">
<h3>Smart Watch</h3>
<p>$120</p>

<div class="quantity">
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<button onclick="addToCart('Smart Watch',120,this)">Add To Cart</button>
</div>

<div class="product" data-name="Sneakers">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sneakers</h3>
<p>$80</p>

<div class="quantity">
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<button onclick="addToCart('Sneakers',80,this)">Add To Cart</button>
</div>

</div>

<div id="cart">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<p><b>Total: $<span id="total">0</span></b></p>

<form onsubmit="sendOrder(event)">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<textarea id="address" placeholder="Delivery Address" required></textarea>

<button type="submit">Place Order</button>

</form>

</div>

<script>

let cart=[];
let total=0;

function changeQty(btn,amount){

let qtySpan=btn.parentElement.querySelector(".qty");
let qty=parseInt(qtySpan.innerText);

qty+=amount;

if(qty<1) qty=1;

qtySpan.innerText=qty;

}

function addToCart(name,price,btn){

let qty=parseInt(btn.parentElement.querySelector(".qty").innerText);

cart.push({
name:name,
price:price,
qty:qty
});

total+=price*qty;

updateCart();

}

function updateCart(){

let list=document.getElementById("cartItems");
list.innerHTML="";

cart.forEach(item=>{
let li=document.createElement("li");
li.innerText=item.name+" x"+item.qty+" = $"+(item.price*item.qty);
list.appendChild(li);
});

document.getElementById("total").innerText=total;

}

function searchProduct(){

let input=document.getElementById("searchBox").value.toLowerCase();

let products=document.querySelectorAll(".product");

products.forEach(p=>{

let name=p.getAttribute("data-name").toLowerCase();

p.style.display=name.includes(input) ? "block" : "none";

});

}

function sendOrder(e){

e.preventDefault();

let orderText="";

cart.forEach(item=>{
orderText+=item.name+" x"+item.qty+" = $"+(item.price*item.qty)+"\n";
});

let params={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
address:document.getElementById("address").value,
order:orderText,
total:total
};

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",params)
.then(function(){

alert("Order Sent Successfully!");

});

}

</script>

</body>
</html>
